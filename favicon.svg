<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1A1814"/>
  <!-- Bottle body -->
  <rect x="22" y="28" width="20" height="26" rx="2" fill="#C4A97D" opacity="0.9"/>
  <!-- Bottle neck -->
  <rect x="26" y="20" width="12" height="10" rx="1" fill="#C4A97D" opacity="0.8"/>
  <!-- Bottle cap -->
  <rect x="24" y="14" width="16" height="8" rx="2" fill="#9E7E50"/>
  <!-- Label line -->
  <rect x="25" y="35" width="14" height="0.8" fill="#1A1814" opacity="0.5"/>
  <rect x="25" y="44" width="14" height="0.8" fill="#1A1814" opacity="0.5"/>
  <!-- K letter on bottle -->
  <text x="32" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1814" font-weight="bold">KT</text>
  <!-- Shine -->
  <rect x="24" y="29" width="3" height="20" rx="1.5" fill="white" opacity="0.12"/>
</svg>
